name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check
        run: |
          python -m py_compile \
            my-agent.py \
            engine/local-agent-engine.py \
            engine/telegram-bot.py \
            tools/full-toolkit.py
